name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: read
      contents: read
      pull-requests: read
    outputs:
      changelog_only: ${{ steps.classify.outputs.changelog_only }}
      changelog_changed: ${{ steps.classify.outputs.changelog_changed }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      full_suite: ${{ steps.classify.outputs.full_suite }}
      release_sensitive: ${{ steps.classify.outputs.release_sensitive }}
      interface_sensitive: ${{ steps.classify.outputs.interface_sensitive }}
      mcp_sensitive: ${{ steps.classify.outputs.mcp_sensitive }}
      edition_sensitive: ${{ steps.classify.outputs.edition_sensitive }}
      platform_sensitive: ${{ steps.classify.outputs.platform_sensitive }}
    steps:
      - name: Classify revision scope
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            let changelogOnly = false;
            let changelogChanged = false;
            let docsOnly = false;
            let fullSuite = context.eventName === 'push';
            let releaseSensitive = context.eventName === 'push';
            let interfaceSensitive = context.eventName === 'push';
            let mcpSensitive = context.eventName === 'push';
            let editionSensitive = context.eventName === 'push';
            let platformSensitive = context.eventName === 'push';
            let files = [];
            let fastPathTrust = 'not evaluated';

            const isDocsOnly = (filename) =>
              typeof filename === 'string' &&
              (
                filename === 'CHANGELOG.md' ||
                filename === 'README.md' ||
                filename === 'README_zh.md' ||
                filename === 'CONTRIBUTING.md' ||
                filename === 'SECURITY.md' ||
                filename === 'CODE_OF_CONDUCT.md' ||
                filename === 'LICENSE' ||
                filename === 'NOTICE' ||
                filename === '.github/PULL_REQUEST_TEMPLATE.md' ||
                filename.startsWith('.github/ISSUE_TEMPLATE/') ||
                filename.startsWith('docs/')
              );
            const isReleaseSensitive = (filename) =>
              typeof filename === 'string' &&
              (
                filename.startsWith('scripts/release/') ||
                filename.startsWith('scripts/install') ||
                filename.startsWith('Formula/') ||
                filename.startsWith('build/') ||
                filename === '.goreleaser.yaml' ||
                filename === '.github/workflows/release.yml' ||
                filename === '.github/workflows/withdraw-release.yml'
              );
            const isPlatformSensitive = (filename) =>
              typeof filename === 'string' &&
              (
                filename.startsWith('internal/auth/') ||
                filename.startsWith('internal/keychain/') ||
                /_(darwin|windows|linux|unix)(?:_[a-z0-9]+)*\.go$/.test(filename) ||
                filename === '.github/workflows/ci.yml' ||
                filename ===
                  'scripts/policy/run-platform-coverage-gate.sh'
              );
            const isNativeGoChange = ({ filename, previous_filename, patch }) => {
              const paths = [filename, previous_filename].filter(
                (value) => typeof value === 'string' && value !== ''
              );
              if (paths.some(isPlatformSensitive)) {
                return true;
              }
              if (!paths.some((value) => value.endsWith('.go'))) {
                return false;
              }
              if (typeof patch !== 'string') {
                return true;
              }
              return (
                /\/\/go:build[^\n]*(darwin|windows|linux|unix)/.test(patch) ||
                /runtime\.GO(OS|ARCH)/.test(patch)
              );
            };
            const isInterfaceSensitive = (filename) =>
              typeof filename === 'string' &&
              (
                filename.startsWith('cmd/') ||
                filename.startsWith('internal/app/') ||
                filename.startsWith('internal/cli/') ||
                filename.startsWith('internal/cobracmd/') ||
                filename.startsWith('internal/helpers/') ||
                filename.startsWith('internal/i18n/') ||
                filename.startsWith('internal/interfacesnapshot/') ||
                filename.startsWith('internal/ir/') ||
                filename.startsWith('internal/shortcut/') ||
                filename.startsWith('pkg/cmdutil/') ||
                filename === 'skills_embed.go' ||
                filename === 'test/fixtures/cli-interface-baseline.txt' ||
                filename.startsWith('skills/')
              );
            const isMCPSensitive = (filename) =>
              typeof filename === 'string' &&
              (
                filename.startsWith('internal/mcp') ||
                filename.startsWith('internal/transport/') ||
                filename.startsWith('internal/helpers/') ||
                filename.startsWith('internal/app/') ||
                filename.startsWith('test/mock_mcp/')
              );
            const isEditionSensitive = (filename) =>
              typeof filename === 'string' &&
              (
                filename.startsWith('pkg/edition') ||
                filename.startsWith('internal/edition') ||
                filename === 'go.mod' ||
                filename === 'go.sum'
              );
            const isHighRisk = (filename) =>
              typeof filename === 'string' &&
              (
                isPlatformSensitive(filename) ||
                isReleaseSensitive(filename) ||
                filename.startsWith('.github/workflows/') ||
                filename === '.github/actionlint.yaml' ||
                filename.startsWith('scripts/') ||
                filename.startsWith('verify/') ||
                filename.startsWith('internal/generator/') ||
                filename.startsWith('internal/cli/schema') ||
                filename.startsWith('internal/interfacesnapshot/') ||
                filename.startsWith('internal/app/upgrade') ||
                filename.startsWith('internal/transport/') ||
                filename.startsWith('internal/recovery/') ||
                filename.startsWith('internal/syncdata/') ||
                filename.includes('/testdata/') ||
                filename.startsWith('testdata/') ||
                filename.startsWith('test/fixtures/') ||
                filename === 'Makefile' ||
                filename === 'go.mod' ||
                filename === 'go.sum'
              );
            const classifyFiles = (complete) => {
              const paths = files.flatMap(({ filename, previous_filename }) =>
                [filename, previous_filename].filter(
                  (value) => typeof value === 'string' && value !== ''
                )
              );
              const structuralChange = files.some(
                ({ status, previous_filename }) =>
                  status === 'removed' || Boolean(previous_filename)
              );
              const goPackageShapeChange = files.some(
                ({ filename, previous_filename, status }) =>
                  ['added', 'removed'].includes(status) &&
                  [filename, previous_filename].some(
                    (value) =>
                      typeof value === 'string' && value.endsWith('.go')
                  )
              );
              docsOnly =
                complete &&
                files.length > 0 &&
                paths.length > 0 &&
                paths.every(isDocsOnly);
              releaseSensitive =
                !complete || paths.some(isReleaseSensitive);
              platformSensitive =
                !complete || files.some(isNativeGoChange);
              interfaceSensitive =
                !complete ||
                paths.some(isInterfaceSensitive) ||
                paths.some(isEditionSensitive);
              mcpSensitive =
                !complete || paths.some(isMCPSensitive);
              editionSensitive =
                !complete || paths.some(isEditionSensitive);
              fullSuite =
                !complete ||
                (
                  !docsOnly &&
                  (
                    context.eventName === 'push' ||
                    structuralChange ||
                    goPackageShapeChange ||
                    files.some(isNativeGoChange) ||
                    paths.some(isHighRisk)
                  )
                );
            };

            if (context.eventName === 'pull_request') {
              const expectedHead = context.payload.pull_request.head.sha;
              const expectedBase = context.payload.pull_request.base.sha;
              const assertCurrentRevision = async (phase) => {
                const { data: pull } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                });
                if (pull.head.sha !== expectedHead || pull.base.sha !== expectedBase) {
                  throw new Error(
                    `Pull request revision changed during ${phase}: ` +
                    `expected base/head ${expectedBase}/${expectedHead}, ` +
                    `got ${pull.base.sha}/${pull.head.sha}`
                  );
                }
                return pull;
              };

              const before = await assertCurrentRevision('pre-classification');
              files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              });
              const after = await assertCurrentRevision('post-classification');
              if (
                before.changed_files !== files.length ||
                after.changed_files !== files.length
              ) {
                throw new Error(
                  `Pull request file list is incomplete: API reports ` +
                  `${after.changed_files} changed files, pagination returned ${files.length}`
                );
              }

              changelogOnly =
                files.length === 1 &&
                files[0].filename === 'CHANGELOG.md' &&
                files[0].status === 'modified' &&
                !files[0].previous_filename;
              changelogChanged = files.some(
                ({ filename, previous_filename }) =>
                  filename === 'CHANGELOG.md' ||
                  previous_filename === 'CHANGELOG.md'
              );
              classifyFiles(true);
              fastPathTrust = changelogOnly
                ? 'exact pull-request revision and synthetic merge policy'
                : docsOnly
                  ? 'documentation-only focused admission'
                  : fullSuite
                    ? 'high-risk full admission'
                    : 'changed-package focused admission';
            } else if (context.eventName === 'push') {
              const expectedBefore = context.payload.before;
              const expectedAfter = context.payload.after;
              const fullCommit = /^[0-9a-f]{40}$/;
              const zeroCommit = '0'.repeat(40);

              if (
                context.ref !== 'refs/heads/main' ||
                context.payload.ref !== 'refs/heads/main' ||
                context.payload.created !== false ||
                context.payload.deleted !== false ||
                context.payload.forced !== false ||
                !fullCommit.test(expectedBefore || '') ||
                !fullCommit.test(expectedAfter || '') ||
                expectedBefore === zeroCommit ||
                expectedAfter === zeroCommit ||
                expectedAfter !== context.sha
              ) {
                fastPathTrust =
                  'push identity is not a non-forced update of the existing main branch';
              } else {
                const { data: comparison } =
                  await github.rest.repos.compareCommitsWithBasehead({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    basehead: `${expectedBefore}...${expectedAfter}`,
                    per_page: 100,
                  });
                files = Array.isArray(comparison.files) ? comparison.files : [];
                classifyFiles(files.length < 300);
                const linearFromValidatedTip =
                  comparison.status === 'ahead' &&
                  comparison.merge_base_commit?.sha === expectedBefore &&
                  comparison.behind_by === 0 &&
                  comparison.ahead_by > 0 &&
                  comparison.total_commits === comparison.ahead_by;
                const exactChangelogDiff =
                  files.length === 1 &&
                  files[0].filename === 'CHANGELOG.md' &&
                  files[0].status === 'modified' &&
                  !files[0].previous_filename;

                if (linearFromValidatedTip && exactChangelogDiff) {
                  const requiredContexts = [
                    'Lint',
                    'Test',
                    'Coverage',
                    'Policy',
                    'Edition',
                    'Interface Integrity',
                    'AI Behavior',
                    'CLI Smoke',
                    'Mock MCP',
                  ];
                  const runs = await github.paginate(
                    github.rest.checks.listForRef,
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: expectedBefore,
                      filter: 'latest',
                      per_page: 100,
                    }
                  );
                  const latestByName = new Map();
                  for (const run of runs) {
                    if (
                      run.head_sha !== expectedBefore ||
                      run.app?.slug !== 'github-actions' ||
                      !requiredContexts.includes(run.name)
                    ) {
                      continue;
                    }
                    const current = latestByName.get(run.name);
                    if (!current || run.id > current.id) {
                      latestByName.set(run.name, run);
                    }
                  }
                  const missing = requiredContexts.filter(
                    (name) => !latestByName.has(name)
                  );
                  const nonSuccess = requiredContexts.flatMap((name) => {
                    const run = latestByName.get(name);
                    if (!run || run.conclusion === 'success') {
                      return [];
                    }
                    return [
                      `${name}=${run.conclusion || run.status || 'unknown'}`,
                    ];
                  });

                  if (missing.length === 0 && nonSuccess.length === 0) {
                    changelogOnly = true;
                    changelogChanged = true;
                    fastPathTrust =
                      `exact CHANGELOG-only successor of validated ${expectedBefore}`;
                  } else {
                    fastPathTrust =
                      'predecessor Code Admission is not fully successful; ' +
                      `missing=${missing.join(',') || 'none'}; ` +
                      `non-success=${nonSuccess.join(',') || 'none'}`;
                  }
                } else {
                  fastPathTrust =
                    'push is not an exact linear CHANGELOG-only successor';
                }
              }
            }

            core.setOutput('changelog_only', String(changelogOnly));
            core.setOutput('changelog_changed', String(changelogChanged));
            core.setOutput('docs_only', String(docsOnly));
            core.setOutput('full_suite', String(fullSuite));
            core.setOutput('release_sensitive', String(releaseSensitive));
            core.setOutput('interface_sensitive', String(interfaceSensitive));
            core.setOutput('mcp_sensitive', String(mcpSensitive));
            core.setOutput('edition_sensitive', String(editionSensitive));
            core.setOutput('platform_sensitive', String(platformSensitive));
            await core.summary
              .addHeading('Code Admission scope')
              .addRaw(`- Event: \`${context.eventName}\`\n`)
              .addRaw(`- Exact modified CHANGELOG only: \`${changelogOnly}\`\n`)
              .addRaw(`- CHANGELOG touched: \`${changelogChanged}\`\n`)
              .addRaw(`- Documentation-only: \`${docsOnly}\`\n`)
              .addRaw(`- Full suite: \`${fullSuite}\`\n`)
              .addRaw(`- Release-sensitive: \`${releaseSensitive}\`\n`)
              .addRaw(`- Interface-sensitive: \`${interfaceSensitive}\`\n`)
              .addRaw(`- MCP-sensitive: \`${mcpSensitive}\`\n`)
              .addRaw(`- Edition-sensitive: \`${editionSensitive}\`\n`)
              .addRaw(`- Native-platform risk paths touched: \`${platformSensitive}\`\n`)
              .addRaw(`- Changed files: \`${files.length}\`\n`)
              .addRaw(`- Fast-path trust: ${fastPathTrust}\n`)
              .write();

      - name: Record CHANGELOG-only fast path
        if: steps.classify.outputs.changelog_only == 'true'
        run: echo "Lint is satisfied by the trusted CHANGELOG-only Policy path." >> "$GITHUB_STEP_SUMMARY"

      - name: Record documentation-only fast path
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only == 'true'
        run: echo "Lint is satisfied by the non-executable documentation scope." >> "$GITHUB_STEP_SUMMARY"

      - name: Check out repository
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only != 'true'
        uses: actions/checkout@v4

      - name: Set up Go
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify Test Package Plan
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only != 'true'
        run: make test-plan

      - name: Format Check
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only != 'true'
        run: make format-check

      - name: Go Vet
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only != 'true'
        run: go vet ./...

      - name: Check GitHub Actions workflows
        if: steps.classify.outputs.changelog_only != 'true' && steps.classify.outputs.docs_only != 'true'
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  test-focused:
    name: Test (changed packages)
    needs: lint
    if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && needs.lint.outputs.full_suite != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify authoritative synthetic merge
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          test "$(git rev-parse HEAD^1)" = "$PR_BASE_SHA" || {
            echo "focused test merge first parent does not match event base" >&2
            exit 1
          }
          test "$(git rev-parse HEAD^2)" = "$PR_HEAD_SHA" || {
            echo "focused test merge second parent does not match event head" >&2
            exit 1
          }
          echo "TEST_BASE_REF=$PR_BASE_SHA" >> "$GITHUB_ENV"
          echo "TEST_HEAD_REF=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test changed packages and reverse dependencies
        shell: bash
        env:
          DWS_PACKAGE_VERSION: 0.0.0-test
        run: |
          set -euo pipefail
          package_output="$(
            ./scripts/ci/changed-test-packages.sh \
              list "$TEST_BASE_REF" "$TEST_HEAD_REF"
          )"
          if [ -z "$package_output" ]; then
            echo "No buildable Go package is affected by this revision." \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          mapfile -t packages <<< "$package_output"
          go test -v -race -count=1 -timeout=8m "${packages[@]}"

  test-race:
    name: "Test (race: ${{ matrix.shard }})"
    needs: lint
    if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && needs.lint.outputs.full_suite == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          - app
          - generators
          - helpers
          - remaining
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        if: ${{ matrix.shard == 'remaining' }}
        run: make build

      - name: Test shard with Race Detection
        shell: bash
        env:
          DWS_PACKAGE_VERSION: 0.0.0-test
          TEST_SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          package_output="$(./scripts/ci/test-packages.sh list "$TEST_SHARD")"
          test -n "$package_output"
          mapfile -t packages <<< "$package_output"
          test "${#packages[@]}" -gt 0
          go test -v -race -count=1 -timeout=10m "${packages[@]}"

  test-release-scripts:
    name: Test (workflow and release contracts)
    needs: lint
    if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.release_sensitive == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install archive tooling
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Test release scripts
        shell: bash
        env:
          DWS_PACKAGE_VERSION: 0.0.0-test
        run: |
          set -euo pipefail
          package_output="$(./scripts/ci/test-packages.sh list release-scripts)"
          test -n "$package_output"
          mapfile -t packages <<< "$package_output"
          test "${#packages[@]}" -gt 0
          go test -v -count=1 -timeout=10m "${packages[@]}"

  test-cross-platform:
    name: Test (cross-platform compile)
    needs: lint
    if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compile supported operating systems
        shell: bash
        run: |
          set -eu
          for target in darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            output="$RUNNER_TEMP/dws-${goos}-${goarch}"
            if [ "$goos" = windows ]; then
              output="${output}.exe"
            fi
            printf 'compile %s/%s\n' "$goos" "$goarch"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -o "$output" ./cmd
          done

  test:
    name: Test
    needs:
      - lint
      - test-focused
      - test-race
      - test-release-scripts
      - test-cross-platform
      - test-darwin
      - test-windows
    if: ${{ always() && needs.lint.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify test shards
        env:
          CHANGELOG_ONLY: ${{ needs.lint.outputs.changelog_only }}
          DOCS_ONLY: ${{ needs.lint.outputs.docs_only }}
          FULL_SUITE: ${{ needs.lint.outputs.full_suite }}
          RELEASE_SENSITIVE: ${{ needs.lint.outputs.release_sensitive }}
          FOCUSED_RESULT: ${{ needs.test-focused.result }}
          RACE_RESULT: ${{ needs.test-race.result }}
          RELEASE_SCRIPTS_RESULT: ${{ needs.test-release-scripts.result }}
          CROSS_PLATFORM_RESULT: ${{ needs.test-cross-platform.result }}
          DARWIN_RESULT: ${{ needs.test-darwin.result }}
          WINDOWS_RESULT: ${{ needs.test-windows.result }}
        run: |
          failed=0
          if [ "$CHANGELOG_ONLY" = true ] || [ "$DOCS_ONLY" = true ]; then
            for shard in \
              "changed packages:$FOCUSED_RESULT" \
              "race shards:$RACE_RESULT" \
              "release scripts:$RELEASE_SCRIPTS_RESULT" \
              "cross-platform compile:$CROSS_PLATFORM_RESULT" \
              "macOS native:$DARWIN_RESULT" \
              "Windows native:$WINDOWS_RESULT"
            do
              name="${shard%%:*}"
              result="${shard#*:}"
              printf '%s: %s\n' "$name" "$result"
              if [ "$result" != skipped ]; then
                failed=1
              fi
            done
            test "$failed" -eq 0
            exit
          fi

          focused_expected=success
          race_expected=skipped
          if [ "$FULL_SUITE" = true ]; then
            focused_expected=skipped
            race_expected=success
          fi
          release_expected=skipped
          if [ "$FULL_SUITE" = true ] || [ "$RELEASE_SENSITIVE" = true ]; then
            release_expected=success
          fi
          for shard in \
            "changed packages:$FOCUSED_RESULT:$focused_expected" \
            "race shards:$RACE_RESULT:$race_expected" \
            "release scripts:$RELEASE_SCRIPTS_RESULT:$release_expected" \
            "cross-platform compile:$CROSS_PLATFORM_RESULT:success"
          do
            name="${shard%%:*}"
            remainder="${shard#*:}"
            result="${remainder%%:*}"
            expected="${remainder#*:}"
            printf '%s: %s (expected %s)\n' "$name" "$result" "$expected"
            if [ "$result" != "$expected" ]; then
              failed=1
            fi
          done

          native_expected=skipped
          if [ "$FULL_SUITE" = true ]; then
            native_expected=success
          fi
          for native in \
            "macOS native:$DARWIN_RESULT" \
            "Windows native:$WINDOWS_RESULT"
          do
            name="${native%%:*}"
            result="${native#*:}"
            printf '%s: %s\n' "$name" "$result"
            if [ "$result" != "$native_expected" ]; then
              failed=1
            fi
          done
          test "$failed" -eq 0

  test-darwin:
    name: Test (macOS auth/keychain)
    needs: lint
    if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && needs.lint.outputs.full_suite == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test macOS auth and Keychain paths with Race Detection
        run: go test -v -race -count=1 -timeout=10m ./internal/keychain ./internal/auth ./internal/app

  test-windows:
    name: Test (Windows)
    needs: lint
    if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && needs.lint.outputs.full_suite == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows CLI
        run: go build -o dws.exe ./cmd

      - name: Test Windows auth and DPAPI packages
        run: go test -v -count=1 -timeout=10m ./internal/keychain ./internal/auth

