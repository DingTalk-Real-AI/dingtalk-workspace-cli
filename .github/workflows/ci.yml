  coverage:
    name: Coverage
    needs:
      - lint
      - coverage-current
      - coverage-supporting
      - coverage-baseline
      - coverage-darwin
      - coverage-windows
    if: ${{ always() && needs.lint.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify coverage profile jobs
        env:
          CHANGELOG_ONLY: ${{ needs.lint.outputs.changelog_only }}
          DOCS_ONLY: ${{ needs.lint.outputs.docs_only }}
          FULL_SUITE: ${{ needs.lint.outputs.full_suite }}
          PLATFORM_SENSITIVE: ${{ needs.lint.outputs.platform_sensitive }}
          CURRENT_RESULT: ${{ needs.coverage-current.result }}
          SUPPORTING_RESULT: ${{ needs.coverage-supporting.result }}
          BASELINE_RESULT: ${{ needs.coverage-baseline.result }}
          DARWIN_RESULT: ${{ needs.coverage-darwin.result }}
          WINDOWS_RESULT: ${{ needs.coverage-windows.result }}
        run: |
          failed=0
          current_expected=success
          supporting_expected=skipped
          baseline_expected=success
          native_expected=skipped
          if [ "$CHANGELOG_ONLY" = true ] || [ "$DOCS_ONLY" = true ]; then
            current_expected=skipped
            baseline_expected=skipped
          elif [ "$FULL_SUITE" = true ]; then
            supporting_expected=success
          fi
          if [ "$CHANGELOG_ONLY" != true ] &&
             [ "$DOCS_ONLY" != true ] &&
             [ "$PLATFORM_SENSITIVE" = true ]; then
            native_expected=success
          fi

          for profile in \
            "current:$CURRENT_RESULT:$current_expected" \
            "supporting:$SUPPORTING_RESULT:$supporting_expected" \
            "baseline:$BASELINE_RESULT:$baseline_expected"
          do
            name="${profile%%:*}"
            remainder="${profile#*:}"
            result="${remainder%%:*}"
            expected="${remainder#*:}"
            printf '%s: %s (expected %s)\n' "$name" "$result" "$expected"
            if [ "$result" != "$expected" ]; then
              failed=1
            fi
          done

          for native in \
            "macOS native:$DARWIN_RESULT" \
            "Windows native:$WINDOWS_RESULT"
          do
            name="${native%%:*}"
            result="${native#*:}"
            printf '%s: %s (expected %s)\n' \
              "$name" "$result" "$native_expected"
            if [ "$result" != "$native_expected" ]; then
              failed=1
            fi
          done
          test "$failed" -eq 0

      - name: Check out repository
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve authoritative coverage base
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -eu
          base_ref="$PUSH_BEFORE_SHA"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="$(git merge-base "$PR_HEAD_SHA" "$PR_BASE_SHA")"
          fi
          if [ -z "$base_ref" ] || [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-parse HEAD^)"
          fi
          git rev-parse --verify "${base_ref}^{commit}" >/dev/null
          echo "COVERAGE_BASE_REF=$base_ref" >> "$GITHUB_ENV"

      - name: Download current coverage profile
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-current-profile
          path: .

      - name: Download supporting coverage profiles
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && needs.lint.outputs.full_suite == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-supporting-profiles
          path: .

      - name: Download baseline coverage profile
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-baseline-profile
          path: .

      - name: Enforce coverage gate
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        env:
          COVERAGE_TARGET: "100"
          COVERAGE_ENFORCE_OVERALL: "false"
          COVERAGE_OVERALL_TOLERANCE: "0"
        run: |
          additional_profile=
          if [ -f coverage-shortcut.txt ]; then
            additional_profile=coverage-shortcut.txt
          fi
          COVERAGE_ADDITIONAL_DIFF_PROFILE="$additional_profile" \
            make coverage-gate BASE_REF="$COVERAGE_BASE_REF"

      - name: Generate coverage report
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        run: |
          if [ "$(wc -l < coverage.txt)" -gt 1 ]; then
            go tool cover -html=coverage.txt -o coverage.html
          else
            echo "No buildable Go package needed a coverage HTML report." \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.txt
            coverage-base.txt
            coverage-policy.txt
            coverage-shortcut.txt
            coverage.html
          if-no-files-found: error

  policy:
    name: Policy
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify pull request merge revision
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          test "$(git rev-parse HEAD^1)" = "$PR_BASE_SHA" || {
            echo "checked-out merge first parent does not match event base" >&2
            exit 1
          }
          test "$(git rev-parse HEAD^2)" = "$PR_HEAD_SHA" || {
            echo "checked-out merge second parent does not match event head" >&2
            exit 1
          }

      - name: Validate changed CHANGELOG content
        if: github.event_name == 'pull_request'
        env:
          CLASSIFIED_CHANGELOG_CHANGED: ${{ needs.lint.outputs.changelog_changed }}
          CHANGELOG_ONLY: ${{ needs.lint.outputs.changelog_only }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -eu
          merge_changelog_changed=false
          if git diff --no-ext-diff --find-renames --name-status \
            "$PR_BASE_SHA" HEAD |
            awk -F '\t' '
              {
                for (field = 2; field <= NF; field++) {
                  if ($field == "CHANGELOG.md") found = 1
                }
              }
              END { exit !found }
            '
          then
            merge_changelog_changed=true
          fi
          test "$merge_changelog_changed" = "$CLASSIFIED_CHANGELOG_CHANGED" || {
            echo "Files API and synthetic merge tree disagree on CHANGELOG scope" >&2
            exit 1
          }
          if [ "$merge_changelog_changed" != true ]; then
            exit 0
          fi

          mode=--content-only
          if [ "$CHANGELOG_ONLY" = true ]; then
            mode=--fast-path
          fi
          ./scripts/policy/check-changelog-pr.sh \
            "$mode" "$PR_BASE_SHA" HEAD

      - name: Validate trusted main CHANGELOG-only push
        if: github.event_name == 'push' && needs.lint.outputs.changelog_only == 'true'
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          set -eu
          test "$(git rev-parse HEAD)" = "$PUSH_AFTER_SHA" || {
            echo "checked-out push revision does not match event after SHA" >&2
            exit 1
          }
          ./scripts/policy/check-changelog-pr.sh \
            --fast-path "$PUSH_BEFORE_SHA" "$PUSH_AFTER_SHA"

      - name: Record CHANGELOG-only fast path
        if: needs.lint.outputs.changelog_only == 'true'
        run: |
          echo "Only the trusted base-equivalent CHANGELOG validator ran; executable sources are unchanged." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Validate scoped policy
        if: ${{ needs.lint.outputs.changelog_only != 'true' && (needs.lint.outputs.docs_only == 'true' || (needs.lint.outputs.full_suite != 'true' && needs.lint.outputs.interface_sensitive != 'true')) }}
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -eu
          base_ref="$PUSH_BEFORE_SHA"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="$PR_BASE_SHA"
          fi
          git rev-parse --verify "${base_ref}^{commit}" >/dev/null
          git diff --check "$base_ref" HEAD
          ./scripts/policy/check-open-source-assets.sh
          echo "Policy used the scoped content/source admission path." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        run: make build

      - name: Policy
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        run: make policy

  interface-integrity:
    name: Interface Integrity
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        run: make build

      - name: Resolve authoritative compatibility merge-base
        if: ${{ needs.lint.outputs.changelog_only != 'true' && needs.lint.outputs.docs_only != 'true' && (needs.lint.outputs.full_suite == 'true' || needs.lint.outputs.interface_sensitive == 'true') }}
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -eu
          base_ref="$PUSH_BEFORE_SHA"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="$(git merge-base "$PR_HEAD_SHA" "$PR_BASE_SHA")"
          fi
          if [ -z "$base_ref" ] || [ "$base_ref" = "0000000000000000000000000000000000000000" ]; then
            base_ref="$(git rev-parse HEAD^)"
          fi
          git rev-parse --verify "${base_ref}^{commit}" >/dev/null
          stable_ref="$(git tag --merged "$base_ref" --list 'v[0-9]*' --sort=-version:refname | awk 'index($0, "-") == 0 { print; exit }')"
          if [ -z "$stable_ref" ]; then
            echo "No stable release tag is reachable from compatibility base $base_ref" >&2
            exit 1
          fi
          git rev-parse --verify "${stable_ref}^{commit}" >/dev/null
          echo "COMPATIBILITY_BASE_REF=$base_ref" >> "$GITHUB_ENV"
          echo "COMPATIBILITY_STABLE_REF=$stable_ref" >> "$GITHUB_ENV"

      - name: Check historical commands and help compatibility
