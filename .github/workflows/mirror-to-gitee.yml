# 把 main 分支代码镜像到 Gitee，供国内用户访问（raw 脚本入口）。
# README 本地化由 scripts/release/localize-readme-for-gitee.sh 处理。
# Tag + release 附件推送由 release.yml 的 sync-to-gitee.sh 负责，这里不处理。
# 用 HTTPS + 令牌直接 git push（无需 SSH key），复用已配置的 secret：
#   GITEE_TOKEN  —— Gitee 私人令牌（勾 projects）
#   GITEE_USER   —— 令牌所属 Gitee 用户名（用于 https 推送鉴权）
#   GITEE_REPO   —— "owner/repo"，如 DingTalk-Real-AI/dingtalk-workspace-cli
# 未配置 GITEE_TOKEN 时（如 fork）自动跳过，不报红叉。
name: Mirror code to Gitee

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: gitee-code-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITEE_USER: ${{ secrets.GITEE_USER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
    steps:
      - name: Checkout
        if: env.GITEE_TOKEN != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to Gitee (with README localization)
        if: env.GITEE_TOKEN != ''
        run: |
          set -eu
          REMOTE="https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"

          git fetch --force origin 'refs/heads/main:refs/remotes/origin/main'

          # Gitee 专属分支：在 origin/main 之上叠加 README 本地化 commit。
          # GitHub 那份 README 不变；只有推往 Gitee 的副本被改写。
          git checkout -B gitee-main origin/main
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"

          ./scripts/release/localize-readme-for-gitee.sh

          git add README.md README_zh.md 2>/dev/null || true
          git commit -m "docs(gitee): localize install commands + coverage badge for Gitee mirror" || true

          git push --force "$REMOTE" 'gitee-main:refs/heads/main'
          echo "✅ 已镜像 main(+Gitee README 本地化) 到 Gitee ${GITEE_REPO}"
